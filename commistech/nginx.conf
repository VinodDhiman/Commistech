##############################################################
#  Commis Tech — Nginx Configuration (EC2 deployment option)
#  Place at: /etc/nginx/sites-available/commistech.conf
#  Enable:   sudo ln -s /etc/nginx/sites-available/commistech.conf /etc/nginx/sites-enabled/
#  Test:     sudo nginx -t
#  Reload:   sudo systemctl reload nginx
##############################################################

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name commistech.com www.commistech.com;

    # ACME challenge for Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;

    server_name commistech.com www.commistech.com;

    # ─── SSL Certificates (Certbot / ACM) ────────────────
    ssl_certificate     /etc/letsencrypt/live/commistech.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/commistech.com/privkey.pem;
    ssl_dhparam         /etc/ssl/certs/dhparam.pem;

    # ─── SSL Hardening ───────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── OCSP Stapling ───────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver 8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ─── Document Root ───────────────────────────────────
    root /var/www/commistech;
    index index.html;
    charset utf-8;

    # ─── Security Headers ─────────────────────────────────
    add_header Strict-Transport-Security       "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options                 "DENY" always;
    add_header X-Content-Type-Options          "nosniff" always;
    add_header X-XSS-Protection                "1; mode=block" always;
    add_header Referrer-Policy                 "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy              "geolocation=(), microphone=(), camera=(), payment=(), usb=(), interest-cohort=()" always;
    add_header Content-Security-Policy         "default-src 'self'; script-src 'self' 'nonce-CT2026x9z'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self';" always;
    add_header Cross-Origin-Opener-Policy      "same-origin" always;
    add_header Cross-Origin-Embedder-Policy    "require-corp" always;
    add_header Cross-Origin-Resource-Policy    "same-origin" always;

    # ─── Hide Nginx version ───────────────────────────────
    server_tokens off;

    # ─── Gzip Compression ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/json application/xml
        application/rss+xml font/woff font/woff2
        image/svg+xml image/x-icon;

    # ─── Brotli (if module installed) ────────────────────
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/html text/css application/javascript application/json;

    # ─── Static file caching ─────────────────────────────
    location ~* \.(css|js|woff2?|ttf|otf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp|avif)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
        access_log off;
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
    }

    # ─── SPA routing — serve index.html for all routes ───
    location / {
        try_files $uri $uri/ /index.html =404;
    }

    # ─── Block sensitive files ────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~* \.(env|log|sh|sql|bak|conf|git)$ {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ─── Rate limiting for contact/API ───────────────────
    # Define in nginx.conf http block: limit_req_zone $binary_remote_addr zone=api:10m rate=10r/m;
    # location /api/ {
    #     limit_req zone=api burst=5 nodelay;
    #     proxy_pass http://127.0.0.1:3000;
    # }

    # ─── Logging ─────────────────────────────────────────
    access_log /var/log/nginx/commistech_access.log;
    error_log  /var/log/nginx/commistech_error.log warn;

    # ─── Custom error pages ───────────────────────────────
    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;
}
