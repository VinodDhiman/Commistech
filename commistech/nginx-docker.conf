##############################################################
#  nginx-docker.conf — used inside Docker container
#  SSL is terminated at the ALB or CloudFront layer
##############################################################

server {
    listen 80;
    server_name _;
    charset utf-8;
    server_tokens off;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers (SSL headers added by ALB/CloudFront)
    add_header X-Frame-Options          "DENY" always;
    add_header X-Content-Type-Options   "nosniff" always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy       "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy  "default-src 'self'; script-src 'self' 'nonce-CT2026x9z'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self'; frame-ancestors 'none';" always;

    gzip on;
    gzip_vary on;
    gzip_types text/html text/css application/javascript application/json image/svg+xml;

    location ~* \.(css|js|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    location ~* \.(jpg|jpeg|png|gif|ico|svg|webp)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000";
    }

    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html =404;
    }

    location ~ /\. { deny all; }

    error_page 404 /index.html;
    error_page 500 502 503 504 /index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log warn;
}
